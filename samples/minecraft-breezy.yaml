# Sample HostedGame migrated from modules/k8s/apps/games/minecraft-breezy.
# Demonstrates: workload, persistence, idle scale-to-zero with Minecraft
# SLP queries, lifecycle hooks (RCON save + stop), backup policy.
#
# Apply with:
#   kubectl apply -f samples/minecraft-breezy.yaml
#
# Before applying:
#   - Create the apps/minecraft-breezy-backup-creds Secret with
#     AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, RESTIC_PASSWORD.
#   - Verify the role=game-server node label exists on a node with
#     enough CPU/memory (the original Deployment targeted that pool).
apiVersion: games.dionysus.io/v1alpha1
kind: HostedGame
metadata:
  name: minecraft-breezy
  namespace: apps
spec:
  displayName: "NixLab Breezy"
  image: itzg/minecraft-server:java21
  imagePullPolicy: Always

  env:
    - { name: EULA,        value: "TRUE" }
    - { name: TYPE,        value: PAPER }
    - { name: VERSION,     value: "1.21.1" }
    - { name: SERVER_PORT, value: "25565" }
    - { name: MEMORY,      value: 4G }
    - { name: USE_AIKAR_FLAGS, value: "true" }
    - { name: ENABLE_RCON, value: "true" }
    - { name: RCON_PASSWORD, value: rconpassword }
    - { name: RCON_PORT,   value: "25575" }
    - { name: ONLINE_MODE, value: "false" }
    - { name: MOTD,        value: "NixLab Breezy" }
    - name: PLUGINS
      value: "https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot,https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot"
    - { name: OPS, value: _olivepasta }

  ports:
    - { name: minecraft, port: 25565, protocol: TCP, nodePort: 25565 }
    - { name: bedrock,   port: 19132, protocol: UDP, nodePort: 19132 }
    - { name: rcon,      port: 25575, protocol: TCP }

  volumes:
    - name: data
      mountPath: /data
      size: 20Gi
      storageClassName: longhorn
      backup: true

  nodeSelector:
    role: game-server

  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 6Gi

  startupProbe:
    tcpSocket:
      port: 25575
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 60
  livenessProbe:
    tcpSocket:
      port: 25575
    initialDelaySeconds: 600
    periodSeconds: 30
    failureThreshold: 10

  lifecycle:
    container: minecraft
    preSaveCommand: ["rcon-cli", "save-all"]
    preSaveWaitSeconds: 10
    stopCommand: ["rcon-cli", "stop"]
    stopWaitSeconds: 60

  idle:
    enabled: true
    query:
      type: Minecraft
      port: 25565
    timeoutMinutes: 30
    intervalSeconds: 120

  backup:
    driver: restic
    schedule: "0 */6 * * *"   # every 6 hours
    retention:
      keepLast: 3
      keepDaily: 7
      keepWeekly: 4
      keepMonthly: 3
    s3:
      endpoint: storage.googleapis.com
      bucket: casazza-minecraft-backups
      prefix: minecraft-breezy
      region: us-west1
      credentialsSecretRef:
        name: minecraft-breezy-backup-creds

  discord:
    enabled: true
    description: "Breezy — Paper 1.21.1 + Geyser/Floodgate cross-play"
    publicHost: "mc.casazza.io"
    connectionHint: |
      **Java:** `mc.casazza.io:25565`
      **Bedrock:** `mc.casazza.io:19132`
      Online mode is off — any username works.
