discord:
  enabled: false
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/olivecasazza/dionysus-discord
    tag: ''
  port: 8080
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/olivecasazza/dionysus
  tag: ''
imagePullSecrets:
- name: ghcr-pull
metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    enabled: true
    interval: 15s
replicaCount: 1
resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
serviceAccount:
  create: true
  name: dionysus
