apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: dionysus
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-0.1.0
  name: dionysus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: dionysus
      app.kubernetes.io/name: dionysus
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: dionysus
        app.kubernetes.io/name: dionysus
    spec:
      containers:
        - env:
            - name: METRICS_PORT
              value: '8080'
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
          imagePullPolicy: '{{ .Values.image.pullPolicy }}'
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
          name: dionysus
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      imagePullSecrets:
        - name: ghcr-pull
      serviceAccountName: dionysus
