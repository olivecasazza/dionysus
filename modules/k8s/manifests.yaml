apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus-operator
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-operator-0.1.0
  name: dionysus-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus-operator
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-operator-0.1.0
  name: dionysus-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: dionysus-operator
      app.kubernetes.io/name: dionysus-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: dionysus-operator
        app.kubernetes.io/name: dionysus-operator
    spec:
      containers:
        - env:
            - name: METRICS_PORT
              value: '8080'
          image: ghcr.io/olivecasazza/dionysus-operator:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
          name: dionysus-operator
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: probe
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      imagePullSecrets:
        - name: ghcr-pull
      serviceAccountName: dionysus-operator
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus-operator
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-operator-0.1.0
  name: dionysus-operator-metrics
spec:
  ports:
    - name: metrics
      port: 8080
      protocol: TCP
      targetPort: metrics
  selector:
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/name: dionysus-operator
  type: ClusterIP
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus-operator
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-operator-0.1.0
  name: dionysus-operator-role
rules:
  - apiGroups:
      - games.dionysus.io
    resources:
      - hostedgames
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - games.dionysus.io
    resources:
      - hostedgames/status
      - hostedgames/finalizers
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ''
    resources:
      - services
      - persistentvolumeclaims
      - pods
      - pods/log
      - pods/exec
      - events
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ''
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus-operator
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-operator-0.1.0
  name: dionysus-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dionysus-operator-role
subjects:
  - kind: ServiceAccount
    name: dionysus-operator
    namespace: '{{ .Release.Namespace }}'
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus-operator
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-operator-0.1.0
  name: dionysus-operator
spec:
  endpoints:
    - interval: 15s
      port: metrics
  selector:
    matchLabels:
      app.kubernetes.io/instance: dionysus-operator
      app.kubernetes.io/name: dionysus-operator
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: discord
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus-operator
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-operator-0.1.0
  name: dionysus-operator-discord
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
  selector:
    app.kubernetes.io/component: discord
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/name: dionysus-operator
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: discord
    app.kubernetes.io/instance: dionysus-operator
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: dionysus-operator
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: dionysus-operator-0.1.0
  name: dionysus-operator-discord
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: discord
      app.kubernetes.io/instance: dionysus-operator
      app.kubernetes.io/name: dionysus-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/component: discord
        app.kubernetes.io/instance: dionysus-operator
        app.kubernetes.io/name: dionysus-operator
    spec:
      containers:
        - env:
            - name: DISCORD_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  key: public-key
                  name: dionysus-operator-discord-creds
            - name: DISCORD_APP_ID
              valueFrom:
                secretKeyRef:
                  key: app-id
                  name: dionysus-operator-discord-creds
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  key: bot-token
                  name: dionysus-operator-discord-creds
          image: ghcr.io/olivecasazza/dionysus-discord:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          name: discord
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      imagePullSecrets:
        - name: ghcr-pull
      serviceAccountName: dionysus-operator
---
